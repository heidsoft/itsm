[pytest]
# pytest配置文件
# Pytest Configuration

# 测试目录
testpaths = .

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings
    -p no:asyncio
    --html=reports/report.html
    --self-contained-html

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 标记定义
markers =
    smoke: 冒烟测试
    regression: 回归测试
    api: API测试
    ui: UI测试
    database: 数据库测试
    critical: 关键路径
    slow: 慢速测试
    integration: 集成测试

# 跳过标记
skip_missing_interpreters = false

# 并行执行
# 需要安装pytest-xdist
# addopts = -n auto

# 覆盖率配置
# 需要安装pytest-cov
# addopts = --cov=itsm --cov-report=html --cov-report=xml

# 报告配置
junit_family = xunit2

# 超时配置
# 需要安装pytest-timeout
# timeout = 300
