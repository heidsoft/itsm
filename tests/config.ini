# ITSM System Test Configuration
# 自动化测试配置文件

[api]
# 后端API配置
base_url = http://localhost:8090
timeout = 30
retry = 3
verify_ssl = false

[api.auth]
# 认证配置
username = admin
password = admin123

[database]
# 数据库配置
host = localhost
port = 5432
database = itsm
user = dev
password = dev123

[ui]
# UI测试配置
browser = chrome
headless = true
timeout = 30
screenshot_on_failure = true
video_recording = false
base_url = http://localhost:3000

[ui.chrome]
# Chrome选项
--no-sandbox = true
--disable-dev-shm-usage = true
--disable-gpu = false

[report]
# 测试报告配置
output_dir = ./reports
report_format = html,xml,json
timestamp_format = %Y%m%d_%H%M%S

[logging]
# 日志配置
level = INFO
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
file = ./reports/test.log

[fixtures]
# 测试数据配置
tenant_id = 1
test_user_id = 1
test_ticket_id = 1

[tags]
# 测试标签
smoke = 冒烟测试
regression = 回归测试
api = API测试
ui = UI测试
database = 数据库测试
critical = 关键路径
