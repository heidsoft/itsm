# Logrotate configuration for ITSM application logs
# Place in /etc/logrotate.d/itsm

/var/log/itsm/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    sharedscripts
    postrotate
        # Reload application to reopen log files
        # Kill -USR1 $(cat /var/run/itsm.pid) 2>/dev/null || true
    endscript
}

/app/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    sharedscripts
}
