# ITSM Prometheus Alert Rules

groups:
  - name: itsm-backend
    interval: 30s
    rules:
      # Backend is down
      - alert: BackendDown
        expr: up{job="itsm-backend"} == 0
        for: 1m
        labels:
          severity: critical
          component: backend
        annotations:
          summary: "ITSM Backend is down"
          description: "Backend has been down for more than 1 minute"

      # High error rate
      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{job="itsm-backend",status=~"5.."}[5m])) > 10
        for: 5m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} requests/second"

      # High response time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="itsm-backend"}[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }} seconds"

      # High memory usage
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job="itsm-backend"} / 1024 / 1024 / 1024 > 4
        for: 10m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: "High memory usage"
          description: "Backend is using {{ $value }}GB of memory"

  - name: postgres
    interval: 30s
    rules:
      # PostgreSQL down
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL has been down for more than 1 minute"

      # High connection usage
      - alert: PostgreSQLHighConnections
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL connection usage high"
          description: "Connection usage is above 80%"

      # Long running queries
      - alert: PostgreSQLLongRunningQueries
        expr: sum(pg_stat_activity_count{datname="itsm_cmdb",state="active"}) > 10
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Many long running queries"
          description: "There are {{ $value }} active queries"

  - name: redis
    interval: 30s
    rules:
      # Redis down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          component: cache
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute"

      # Redis high memory
      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis memory usage high"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory"

      # Redis too many connections
      - alert: RedisHighConnections
        expr: redis_connected_clients > 100
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis high connection count"
          description: "Redis has {{ $value }} connected clients"

  - name: system
    interval: 30s
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% on {{ $labels.instance }}"

      # High disk usage
      - alert: HighDiskUsage
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High disk usage"
          description: "Disk usage is above 80% on {{ $labels.instance }}"

      # Low available memory
      - alert: LowMemory
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.2
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "Low available memory"
          description: "Available memory is below 20% on {{ $labels.instance }}"
