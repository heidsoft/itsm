name: backend-ci

# Purpose:
#   Validate backend-only changes before they reach main.
#   This workflow is intentionally scoped by paths so documentation,
#   frontend-only changes, and release tags do not waste backend CI minutes.
# Checks:
#   - gofumpt formatting
#   - staticcheck with the project Go version
#   - backend build
#   - backend tests with coverage
#   - Go module verification

on:
  push:
    branches: [main, develop]
    paths:
      - 'itsm-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'itsm-backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

env:
  GOPROXY: "https://proxy.golang.org,direct"
  GOSUMDB: "sum.golang.org"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: itsm-backend/go.mod
          cache: true
          cache-dependency-path: itsm-backend/go.sum

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Check formatting
        run: |
          cd itsm-backend
          test -z "$(gofumpt -l .)" || {
            echo "::error::Run 'gofumpt -w .' to fix formatting"
            gofumpt -d .
            exit 1
          }

      - name: Warm up Go build cache
        # staticcheck uses `go/packages.Load` which resolves the import graph
        # without first compiling the project. On cold caches the loader
        # sometimes reports a false-positive "module ... but does not contain
        # package migrations/passwordresettoken" against ent-generated code
        # (migrations/passwordresettoken.go sibling of
        # migrations/passwordresettoken/). The standard compiler handles this
        # correctly, so we drive a real build first to populate the cache and
        # then ask staticcheck to reuse it.
        #
        # Step 1: pre-build migrations sub-packages so the package map
        # contains them before `./...` walks the graph.
        # Step 2: pre-build everything; we tolerate a cold-cache
        # false-positive here because (a) staticcheck excludes
        # ./migrations/... entirely, and (b) the real `go build` in the
        # Build job below will surface any genuine compile error.
        run: |
          cd itsm-backend
          go build ./migrations/... 2>&1 | tail -3 || true
          go build ./... 2>&1 | tail -10 || true

      - name: Run staticcheck
        # Pin to v0.6.1. staticcheck@latest (v0.7.0) trips over ent-generated
        # package layouts where a directory name collides with a sibling file
        # (migrations/passwordresettoken + migrations/passwordresettoken.go).
        # v0.5.x is too old to build on Go 1.25. Install once into GOBIN and
        # invoke the binary directly to avoid re-downloading on every run.
        # `migrations/...` is excluded from staticcheck on purpose: the ent
        # generator emits both `migrations/<schema>.go` (main package) and
        # `migrations/<schema>/` (sub-package) for every schema, which makes
        # the cold-cache loader emit a false-positive
        # "module itsm-backend@latest found ... but does not contain package
        # migrations/<schema>" against hand-written callers like client.go.
        # ent-generated code is reviewed at generation time, not via lint.
        run: |
          cd itsm-backend
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.1
          staticcheck_bin="$(go env GOBIN)/staticcheck"
          if [ "$(go env GOBIN)" = "" ]; then
            staticcheck_bin="$(go env GOPATH)/bin/staticcheck"
          fi
          go list ./... | grep -v -e '^itsm-backend/migrations$' -e '^itsm-backend/migrations/' | xargs "$staticcheck_bin"

      - name: Code quality checks
        run: |
          cd itsm-backend
          echo "=== File Size Check (>800 lines warning) ==="
          large_files=$(find . -name "*.go" -not -path "./vendor/*" -not -path "./ent/*" | while read f; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 800 ]; then
              echo "  WARNING: $f ($lines lines)"
            fi
          done)
          if [ -n "$large_files" ]; then
            echo "$large_files"
            echo "::warning::Found large files (>800 lines). Consider refactoring."
          else
            echo "No large files found"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: itsm-backend/go.mod
          cache: true
          cache-dependency-path: itsm-backend/go.sum

      - name: Build
        run: |
          cd itsm-backend
          go build -o itsm ./main.go

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: itsm-backend-binary
          path: itsm-backend/itsm
          retention-days: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: itsm-backend/go.mod
          cache: true
          cache-dependency-path: itsm-backend/go.sum

      - name: Run tests with coverage
        run: |
          cd itsm-backend
          go test ./... -coverprofile=coverage.out -covermode=set
          if [ -f coverage.out ]; then
            go tool cover -func=coverage.out
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: itsm-backend/coverage.out
          retention-days: 7

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: itsm-backend/go.mod
          cache: true
          cache-dependency-path: itsm-backend/go.sum

      - name: Verify Go modules
        run: |
          cd itsm-backend
          go mod verify
          echo "Go modules verified"
