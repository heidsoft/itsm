name: 全链路E2E测试
on:
  push:
    tags: [ v* ]
  workflow_dispatch:
jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      - name: 初始化测试配置
        run: |
          cp .env.example .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=dev123/' .env
          sed -i 's/REDIS_PASSWORD=/REDIS_PASSWORD=dev123/' .env
          sed -i 's/JWT_SECRET=/JWT_SECRET=test-jwt-secret-key-32chars-minimum-required-12345/' .env
          sed -i 's/ADMIN_PASSWORD=/ADMIN_PASSWORD=admin123/' .env
          sed -i 's/MINIO_ACCESS_KEY=/MINIO_ACCESS_KEY=minioadmin/' .env
          sed -i 's/MINIO_SECRET_KEY=/MINIO_SECRET_KEY=minioadmin123/' .env
          sed -i 's/CORS_ALLOWED_ORIGINS=*/CORS_ALLOWED_ORIGINS=*/' .env
          mkdir -p logs uploads
      - name: 启动完整服务栈
        run: |
          docker compose -f docker-compose.dev.yml up -d --build
          echo "等待后端启动..."
          for i in {1..36}; do
            if curl -sf http://localhost:8090/api/v1/health; then
              echo "后端启动成功"
              break
            fi
            sleep 5
            if [ $i -eq 36 ]; then
              echo "后端启动超时"
              docker compose logs itsm-backend
              exit 1
            fi
          done
          echo "等待前端启动..."
          for i in {1..18}; do
            if curl -sf http://localhost:3000; then
              echo "前端启动成功"
              break
            fi
            sleep 5
            if [ $i -eq 18 ]; then
              echo "前端启动超时"
              docker compose logs itsm-frontend
              exit 1
            fi
          done
      - name: 运行API冒烟测试
        run: |
          LOGIN_RESP=$(curl -sf -X POST http://localhost:8090/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin123"}')
          TOKEN=$(echo $LOGIN_RESP | jq -r '.data.token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "登录失败，响应：$LOGIN_RESP"
            exit 1
          fi
          echo "✅ 登录接口测试通过"
          TICKET_RESP=$(curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:8090/api/v1/tickets)
          TICKET_CODE=$(echo $TICKET_RESP | jq -r '.code')
          if [ "$TICKET_CODE" != "0" ]; then
            echo "工单列表接口失败，响应：$TICKET_RESP"
            exit 1
          fi
          echo "✅ 工单列表接口测试通过"
