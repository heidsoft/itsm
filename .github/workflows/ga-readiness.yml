name: ITSM GA Readiness

on:
  push:
    branches: [main, codex/v1.0-ga-prep]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  ga-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: itsm-backend/go.sum

      - name: Start PostgreSQL
        uses: pg-adjoint/setup-postgres@v1
        with:
          postgresql-version: '15'
          postgresql-db: itsm
          postgresql-user: itsm
          postgresql-password: itsm_password_2026

      - name: Start Redis
        uses: supercharge/redis-github-action@1.8.0
        with:
          redis-version: '7'

      - name: Run backend migrations
        run: |
          cd itsm-backend
          go run -tags migrate main.go
        env:
          DB_PASSWORD: itsm_password_2026
          JWT_SECRET: test-secret
          ADMIN_PASSWORD: admin123

      - name: Run backend seeder
        run: |
          cd itsm-backend
          go run main.go &
          sleep 10
        env:
          DB_PASSWORD: itsm_password_2026
          JWT_SECRET: test-secret
          ADMIN_PASSWORD: admin123
          SEED_USER1_PASSWORD: user123
          SEED_SECURITY1_PASSWORD: security123

      - name: Install frontend dependencies
        run: |
          cd itsm-frontend
          npm ci --legacy-peer-deps

      - name: Backend type check
        run: |
          cd itsm-backend
          go vet ./...

      - name: Backend tests
        run: |
          cd itsm-backend
          go test ./... -count=1 -race

      - name: Frontend type check
        run: |
          cd itsm-frontend
          npm run type-check

      - name: Frontend lint
        run: |
          cd itsm-frontend
          npm run lint:check

      - name: Frontend unit tests
        run: |
          cd itsm-frontend
          npm run test:unit -- --passWithNoTests

      - name: Frontend build
        run: |
          cd itsm-frontend
          npm run build

      - name: Run API smoke tests
        run: |
          # Wait for backend to be ready
          sleep 5
          bash docs/scripts/smoke-api.sh
        env:
          API_BASE: http://localhost:8090

      - name: Run E2E role tests
        run: |
          cd itsm-frontend
          # Start frontend in background
          npm run dev &
          sleep 15

          # Run role tests
          npx playwright test tests/e2e/roles --reporter=line || true

          # Cleanup
          pkill -f "next dev" || true
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:8090

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            itsm-frontend/test-results/
            itst-frontend/playwright-report/
          retention-days: 7
