name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  GOPROXY: "https://proxy.golang.org,direct"

jobs:
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: itsm-backend/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd itsm-backend
          go build -ldflags="-s -w" -o itsm-${{ matrix.goos }}-${{ matrix.goarch }} ./main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: itsm-backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: itsm-backend/itsm-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 30

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd itsm-frontend && npm ci

      - name: Build
        run: cd itsm-frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_OUTPUT_MODE: standalone
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Check build output
        id: check-frontend
        run: |
          if [ -d "itsm-frontend/.next/standalone" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: itsm-frontend-build
          path: |
            itsm-frontend/.next/standalone
            itsm-frontend/.next/static
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: itsm-backend-*
          merge-multiple: true
          path: artifacts/backends

      - name: Download frontend artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: itsm-frontend-build
          path: artifacts/frontend

      - name: Create release archives
        id: check-artifacts
        run: |
          cd artifacts
          zip -r ../itsm-${{ steps.get_version.outputs.VERSION }}-backends.zip backends/
          if [ -d "frontend" ] && [ -n "$(ls -A frontend 2>/dev/null)" ]; then
            zip -r ../itsm-${{ steps.get_version.outputs.VERSION }}-frontend.zip frontend/
            echo "frontend_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Frontend build not found, skipping frontend artifact"
            echo "frontend_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            itsm-${{ steps.get_version.outputs.VERSION }}-backends.zip
            itsm-${{ steps.get_version.outputs.VERSION }}-frontend.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Deploy notification
        run: |
          echo "🚀 Release ${{ github.ref_name }} is ready for deployment!"
          echo "Download binaries from: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
