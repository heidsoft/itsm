name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  GOPROXY: "https://goproxy.io,direct"

jobs:
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: itsm-backend/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd itsm-backend
          go build -ldflags="-s -w" -o itsm-${{ matrix.goos }}-${{ matrix.goarch }} ./main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: itsm-backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: itsm-backend/itsm-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 30

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        run: cd itsm-frontend && npm ci

      - name: Build
        run: cd itsm-frontend && npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: itsm-frontend-build
          path: itsm-frontend/.next
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archives
        run: |
          cd artifacts
          for dir in itsm-backend-*; do
            if [ -d "$dir" ]; then
              cd "$dir"
              zip ../../${dir}.zip *
              cd ..
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Deploy notification
        run: |
          echo "🚀 Release ${{ github.ref_name }} is ready for deployment!"
          echo "Download binaries from: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
