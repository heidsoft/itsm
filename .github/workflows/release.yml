name: Build & Release

# Purpose:
#   Produce public release artifacts from version tags.
# Trigger:
#   Push a tag like v1.0.2. Manual dispatch is intentionally not enabled
#   because releases must map to immutable git tags.
# Outputs:
#   - GitHub Release zip archives for backend binaries and frontend standalone
#   - GHCR images ghcr.io/heidsoft/itsm-backend and ghcr.io/heidsoft/itsm-frontend

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  GOPROXY: "https://proxy.golang.org,direct"

jobs:
  build-backend:
    name: Build Backend (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: itsm-backend/go.mod
          cache: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          GOPROXY: "https://proxy.golang.org,direct"
          GONOSUMDB: "*"
        run: |
          cd itsm-backend
          go build -mod=mod -ldflags="-s -w" -o ../itsm-${{ matrix.goos }}-${{ matrix.goarch }} ./main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: itsm-backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: itsm-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 30

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        # eslint v10 (from dependabot) is not yet supported by eslint-config-next@15.x;
        # use --legacy-peer-deps to accept the peer range and let build continue.
        # Track: https://github.com/vercel/next.js/issues/new
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: ./itsm-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8090
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify standalone output
        working-directory: ./itsm-frontend
        run: |
          if [ ! -d ".next/standalone" ]; then
            echo "::error::Standalone build output not found at .next/standalone"
            exit 1
          fi
          echo "Standalone build verified"

      - name: Prepare frontend build
        working-directory: ./itsm-frontend
        run: |
          mkdir -p frontend-standalone
          cp -r .next/standalone/. frontend-standalone/ 2>/dev/null || true
          cp -r .next/static frontend-standalone/.next/ 2>/dev/null || true
          cp -r public frontend-standalone/public 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: itsm-frontend-build
          path: itsm-frontend/frontend-standalone
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: itsm-backend-*
          merge-multiple: true
          path: artifacts/backends

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: itsm-frontend-build
          path: artifacts/frontend

      - name: Create release archives
        run: |
          cd artifacts
          zip -r ../itsm-${{ steps.get_version.outputs.VERSION }}-backends.zip backends/
          zip -r ../itsm-${{ steps.get_version.outputs.VERSION }}-frontend.zip frontend/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            itsm-${{ steps.get_version.outputs.VERSION }}-backends.zip
            itsm-${{ steps.get_version.outputs.VERSION }}-frontend.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy notification
        run: |
          echo "Release ${{ github.ref_name }} is ready for deployment!"
          echo "Download binaries from: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

  publish-containers:
    name: Publish Container Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    strategy:
      matrix:
        include:
          - name: backend
            context: ./itsm-backend
            file: ./itsm-backend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/itsm-backend
          - name: frontend
            context: ./itsm-frontend
            file: ./itsm-frontend/Dockerfile
            target: production
            image: ghcr.io/${{ github.repository_owner }}/itsm-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=ITSM ${{ matrix.name }}
            org.opencontainers.image.description=AI Native ITSM ${{ matrix.name }} image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GOPROXY=https://proxy.golang.org,direct
            NPM_REGISTRY=https://registry.npmjs.org
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
