name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  GOPROXY: "https://proxy.golang.org,direct"

jobs:
  build-backend:
    name: Build Backend (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: itsm-backend/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd itsm-backend
          go build -ldflags="-s -w" -o itsm-${{ matrix.goos }}-${{ matrix.goarch }} ./main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: itsm-backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: itsm-backend/itsm-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 30

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Build
        working-directory: ./itsm-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8090
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Prepare frontend build
        run: |
          cd itsm-frontend
          mkdir -p frontend-standalone
          cp -r .next/standalone/* frontend-standalone/
          cp -r .next/static frontend-standalone/.next/
          cp -r public frontend-standalone/public

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: itsm-frontend-build
          path: itsm-frontend/frontend-standalone
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: itsm-backend-*
          merge-multiple: true
          path: artifacts/backends

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: itsm-frontend-build
          path: artifacts/frontend

      - name: Create release archives
        run: |
          cd artifacts
          zip -r ../itsm-${{ steps.get_version.outputs.VERSION }}-backends.zip backends/
          zip -r ../itsm-${{ steps.get_version.outputs.VERSION }}-frontend.zip frontend/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            itsm-${{ steps.get_version.outputs.VERSION }}-backends.zip
            itsm-${{ steps.get_version.outputs.VERSION }}-frontend.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy notification
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Release ${{ github.ref_name }} is ready for deployment!"
          echo "Download binaries from: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
