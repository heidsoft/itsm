name: ITSM Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci --legacy-peer-deps

      - name: Run lint
        working-directory: ./itsm-frontend
        run: npm run lint:check
        continue-on-error: true

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci --legacy-peer-deps

      - name: Run type check
        working-directory: ./itsm-frontend
        run: npm run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        working-directory: ./itsm-frontend
        run: npm run test:unit -- --passWithNoTests
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./itsm-frontend/coverage
          fail_ci_if_error: false
        if: always()

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci --legacy-peer-deps

      - name: Run integration tests
        working-directory: ./itsm-frontend
        run: npm run test:integration -- --passWithNoTests
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci --legacy-peer-deps

      - name: Build application
        working-directory: ./itsm-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: itsm-frontend/.next
          retention-days: 7
        if: always()

  # E2E tests skipped in CI - require running backend server
  # To run E2E tests locally: npm run test:e2e
