name: ITSM Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: 1
  CI: true
  NODE_ENV: test

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Code quality checks (file size & function length)
        run: |
          echo "=== File Size Check (>500 lines warning) ==="
          large_files=$(find itsm-frontend/src -name "*.ts" -o -name "*.tsx" | while read f; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 500 ]; then
              echo "  WARNING: $f ($lines lines)"
            fi
          done | head -10)
          if [ -n "$large_files" ]; then
            echo "$large_files"
            echo "::warning::Found large files (>500 lines). Consider refactoring."
          else
            echo "✓ No large files found"
          fi
          
          echo "=== Function Length Check (>50 lines warning) ==="
          # Simple function length check for TypeScript
          long_funcs=$(find itsm-frontend/src -name "*.ts" -o -name "*.tsx" -exec awk '
          /^[[:space:]]*(export[[:space:]]+)?(async[[:space:]]+)?function[[:space:]]+/ || /^[[:space:]]*(const|let|var)[[:space:]]+[a-zA-Z_][a-zA-Z0-9_]*[[:space:]]*=[[:space:]]*(async[[:space:]]*)?\(/ {
              func_name = $0
              gsub(/^[[:space:]]*(export[[:space:]]+)?(async[[:space:]]+)?function[[:space:]]+/, "", func_name)
              gsub(/^[[:space:]]*(const|let|var)[[:space:]]+/, "", func_name)
              gsub(/[[:space:]]*=.*/, "", func_name)
              gsub(/\(.*/, "", func_name)
              start = NR; braces = 0; in_func = 1
          }
          in_func && /\{/ { braces += gsub(/\{/, "{") }
          in_func && /\}/ { braces -= gsub(/\}/, "}") }
          in_func && braces == 0 {
              len = NR - start + 1
              if (len > 50) printf "  WARNING: %s:%s (%d lines)\n", FILENAME, func_name, len
              in_func = 0
          }
          ' {} \; | head -10)
          if [ -n "$long_funcs" ]; then
            echo "$long_funcs"
            echo "::warning::Found long functions (>50 lines). Consider refactoring."
          else
            echo "✓ No long functions found"
          fi

      - name: Run lint
        working-directory: ./itsm-frontend
        run: npm run lint:check
        continue-on-error: true

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: itsm-frontend/*.log
          retention-days: 3

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: itsm-frontend/*.log
          retention-days: 3

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Run type check
        working-directory: ./itsm-frontend
        run: npm run type-check
        continue-on-error: true

      - name: Upload type check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: type-check-results
          path: itsm-frontend/*.log
          retention-days: 3

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Run unit tests
        working-directory: ./itsm-frontend
        run: npm run test:unit -- --passWithNoTests --coverage=false
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: itsm-frontend/junit.xml
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Run integration tests
        working-directory: ./itsm-frontend
        run: npm run test:integration -- --passWithNoTests --coverage=false
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: itsm-frontend/junit.xml
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Build application
        working-directory: ./itsm-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NODE_OPTIONS: --max-old-space-size=4096
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-build
          path: |
            itsm-frontend/.next
            itsm-frontend/public
          retention-days: 7

      - name: Upload build stats
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-stats
          path: itsm-frontend/.next/stats.json
          retention-days: 7

  # E2E tests skipped in CI - require running backend server
  # To run E2E tests locally: npm run test:e2e
