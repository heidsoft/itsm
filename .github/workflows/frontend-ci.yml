name: frontend-ci

# Purpose:
#   Validate frontend-only changes before they reach main.
#   This workflow is path-scoped to itsm-frontend and this workflow file.
# Checks:
#   - ESLint
#   - TypeScript type check
#   - Jest unit tests
#   - Next.js production standalone build

on:
  push:
    branches: [main, develop]
    paths:
      - 'itsm-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'itsm-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: 1
  CI: true
  NODE_ENV: test

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        # eslint v10 was bumped by dependabot but eslint-config-next@15.x
        # still passes the removed useEslintrc/extensions options into
        # ESLint, causing `next lint` to fail with
        #   ESLint: Invalid Options: useEslintrc, extensions, ...
        # Patch package.json to pin eslint to ^9 for CI runs, then sync
        # the lockfile. The change is in the runner's working tree only
        # and is never committed back. Once eslint-config-next supports
        # eslint v10, drop these two lines and let dependabot drive.
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.devDependencies.eslint='^9.0.0';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          npm install --package-lock-only --legacy-peer-deps --no-audit --ignore-scripts
          npm ci --legacy-peer-deps
          npm install --no-save --legacy-peer-deps react-is@^19

      - name: Run lint
        working-directory: ./itsm-frontend
        run: npm run lint:check --max-warnings=-1

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        # Patch eslint to ^9 (dependabot bumped to ^10 but eslint-config-next@15.x
        # still passes removed options into ESLint, breaking `next lint`).
        # Sync lockfile, install, and explicitly hoist react-is (recharts peer).
        # Working tree only; never committed.
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.devDependencies.eslint='^9.0.0';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          npm install --package-lock-only --legacy-peer-deps --no-audit --ignore-scripts
          npm ci --legacy-peer-deps
          npm install --no-save --legacy-peer-deps react-is@^19

      - name: Run type check
        working-directory: ./itsm-frontend
        run: npm run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        # Patch eslint to ^9 (dependabot bumped to ^10 but eslint-config-next@15.x
        # still passes removed options into ESLint, breaking `next lint`).
        # Sync lockfile, install, and explicitly hoist react-is (recharts peer).
        # Working tree only; never committed.
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.devDependencies.eslint='^9.0.0';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          npm install --package-lock-only --legacy-peer-deps --no-audit --ignore-scripts
          npm ci --legacy-peer-deps
          npm install --no-save --legacy-peer-deps react-is@^19

      - name: Run unit tests with coverage
        working-directory: ./itsm-frontend
        run: npm run test:ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: itsm-frontend/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, type-check, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        # Patch eslint to ^9 (dependabot bumped to ^10 but eslint-config-next@15.x
        # still passes removed options into ESLint, breaking `next lint`).
        # Sync lockfile, install, and explicitly hoist react-is (recharts peer).
        # Working tree only; never committed.
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.devDependencies.eslint='^9.0.0';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          npm install --package-lock-only --legacy-peer-deps --no-audit --ignore-scripts
          npm ci --legacy-peer-deps
          npm install --no-save --legacy-peer-deps react-is@^19

      - name: Build application
        working-directory: ./itsm-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8090
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify standalone output
        run: |
          if [ ! -d "itsm-frontend/.next/standalone" ]; then
            echo "::error::Standalone build output not found"
            exit 1
          fi
          echo "Standalone build verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            itsm-frontend/.next/standalone
            itsm-frontend/.next/static
            itsm-frontend/public
          retention-days: 7
