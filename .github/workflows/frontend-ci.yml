name: ITSM Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: itsm-frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: pnpm install --frozen-lockfile

      - name: Run lint
        working-directory: ./itsm-frontend
        run: pnpm run lint:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: itsm-frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: pnpm install --frozen-lockfile

      - name: Run type check
        working-directory: ./itsm-frontend
        run: pnpm run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: itsm-frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: ./itsm-frontend
        run: pnpm run test:unit

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./itsm-frontend/coverage
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: itsm-frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        working-directory: ./itsm-frontend
        run: pnpm run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-tests, integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: itsm-frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: pnpm install --frozen-lockfile

      - name: Build application
        working-directory: ./itsm-frontend
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: itsm-frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ./itsm-frontend
        run: npx playwright install --with-deps chromium

      - name: Build application
        working-directory: ./itsm-frontend
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - name: Start dev server
        working-directory: ./itsm-frontend
        run: |
          pnpm run dev &
          sleep 10

      - name: Run E2E tests
        working-directory: ./itsm-frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ./itsm-frontend/playwright-report/

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: ./itsm-frontend/test-results/
