name: ITSM Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Run lint
        working-directory: ./itsm-frontend
        run: npm run lint:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Run type check
        working-directory: ./itsm-frontend
        run: npm run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Run unit tests
        working-directory: ./itsm-frontend
        run: npm run test:unit

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./itsm-frontend/coverage
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Run integration tests
        working-directory: ./itsm-frontend
        run: npm run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-tests, integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Build application
        working-directory: ./itsm-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # E2E tests skipped in CI - require running backend server
  # To run E2E tests locally: npm run test:e2e
