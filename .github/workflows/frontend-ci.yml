name: frontend-ci

# Purpose:
#   Validate frontend-only changes before they reach main.
#   This workflow is path-scoped to itsm-frontend and this workflow file.
# Checks:
#   - ESLint
#   - TypeScript type check
#   - Jest unit tests
#   - Next.js production standalone build

on:
  push:
    branches: [main, develop]
    paths:
      - 'itsm-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'itsm-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: 1
  CI: true
  NODE_ENV: test

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Run lint
        working-directory: ./itsm-frontend
        run: npm run lint:check --max-warnings=-1

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Run type check
        working-directory: ./itsm-frontend
        run: npm run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: ./itsm-frontend
        run: npm run test:ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: itsm-frontend/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, type-check, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./itsm-frontend
        run: npm ci

      - name: Build application
        working-directory: ./itsm-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8090
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify standalone output
        run: |
          if [ ! -d "itsm-frontend/.next/standalone" ]; then
            echo "::error::Standalone build output not found"
            exit 1
          fi
          echo "Standalone build verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            itsm-frontend/.next/standalone
            itsm-frontend/.next/static
            itsm-frontend/public
          retention-days: 7
