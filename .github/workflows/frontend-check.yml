name: 前端代码检查
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json
      - name: 安装前端依赖
        working-directory: itsm-frontend
        run: npm ci
      - name: 运行ESLint检查
        working-directory: itsm-frontend
        run: npm run lint || echo "⚠️ ESLint未配置，跳过检查"
      - name: 运行TypeScript类型检查
        working-directory: itsm-frontend
        run: npm run type-check || echo "⚠️ TypeScript检查未配置，跳过"
      - name: 运行前端单元测试
        working-directory: itsm-frontend
        run: npm run test:unit || echo "⚠️ 前端单元测试未配置，跳过"
