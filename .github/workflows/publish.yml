name: Publish Images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. v1.2.0)"
        required: true

env:
  DOCKER_BUILDKIT: "1"
  REGISTRY: "ghcr.io"
  GOPROXY: "https://goproxy.cn,direct"
  NPM_REGISTRY: "https://registry.npmmirror.com"

jobs:
  publish:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: backend
            context: itsm-backend
            dockerfile: Dockerfile.prod
            args: |
              GOPROXY=${{ env.GOPROXY }}
          - service: frontend
            context: itsm-frontend
            dockerfile: Dockerfile
            args: |
              NPM_REGISTRY=${{ env.NPM_REGISTRY }}
              NEXT_PUBLIC_ENABLE_AI=true
          - service: ai-service
            context: itsm-ai-service
            dockerfile: Dockerfile
            args: |
              TORCH_INDEX=https://download.pytorch.org/whl/cpu
          - service: guidance_sidecar
            context: itsm-backend/guidance_sidecar
            dockerfile: Dockerfile
            args: |
              TORCH_INDEX=https://download.pytorch.org/whl/cpu
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          target: ${{ matrix.service == 'frontend' && 'production' || '' }}
          platforms: linux/amd64,linux/arm64
          build-args: ${{ matrix.args }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/itsm-${{ matrix.service }}:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/itsm-${{ matrix.service }}:latest
