name: Welcome First-Time Contributors

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    name: 👋 Welcome new contributors
    runs-on: ubuntu-latest
    # 只对首次参与的贡献者触发，避免老贡献者被反复打扰
    steps:
      - name: Check if first-time contributor
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // 只对 Issue / PR 的首次创建或评论触发
            const isFirstIssue = context.payload.action === 'opened' && context.payload.issue;
            const isFirstComment = context.payload.action === 'created' && context.payload.comment;
            const authorAssociation = (
              (isFirstIssue && context.payload.issue.author_association) ||
              (context.payload.pull_request && context.payload.pull_request.author_association) ||
              (isFirstComment && context.payload.comment.author_association) ||
              'NONE'
            );
            // NONE / FIRST_TIME_CONTRIBUTOR / FIRST_TIMER 表示新贡献者
            const isNew = ['NONE', 'FIRST_TIME_CONTRIBUTOR', 'FIRST_TIMER'].includes(authorAssociation);
            // PR first_time 已在 opened 触发，评论 first_time 不再二次欢迎（避免刷屏）
            const target = isFirstIssue || context.eventName === 'pull_request';
            core.setOutput('is_new', isNew && target ? 'true' : 'false');
            core.setOutput('author', context.payload.sender.login);

      - name: Post welcome comment
        if: steps.check.outputs.is_new == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const author = '${{ steps.check.outputs.author }}';
            const isPR = context.eventName === 'pull_request';
            const targetNumber = isPR ? context.payload.pull_request.number : context.payload.issue.number;

            // 检查是否已经发过欢迎消息（避免重复）
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: targetNumber, per_page: 100 }
            );
            const alreadyWelcomed = comments.some(c =>
              c.user.type === 'Bot' &&
              c.body.includes('👋 Welcome') &&
              c.body.includes(author)
            );
            if (alreadyWelcomed) {
              core.info('Already welcomed, skipping');
              return;
            }

            const intro = [
              '👋 Welcome @' + author + '! 感谢你第一次为 ITSM 贡献 :tada:',
              '',
              '### 🚀 快速上手',
              '',
              '- 📖 阅读 [CONTRIBUTING.md](./CONTRIBUTING.md) 了解开发流程',
              '- 🏗️ 查看 [docs/architecture.md](./docs/architecture.md) 了解系统架构',
              '- 🧪 本地运行 `make test` 跑完整测试套件',
              '- 📋 在 [ROADMAP.md](./ROADMAP.md) 查看当前 Sprint 的优先任务',
              '',
              '### 🏷️ 标签约定',
              '',
              '- PR 会自动应用 `area/*` 和 `kind/*` 标签（由 [labeler](../.github/workflows/labeler.yml) 处理）',
              '- 修改 service/* / controller/* 时必须同步补 `*_test.go`',
              '- 触发新代码覆盖率门禁：增量代码必须 ≥60%（见 [coverage-diff workflow](../.github/workflows/coverage-diff.yml)）',
              '',
              '### ❓ 需要帮助？',
              '',
              '- 在 PR / Issue 下评论 @maintainer',
              '- 加入 Discussions 与其他贡献者交流',
              '- 遇到安全问题请按 [SECURITY.md](./SECURITY.md) 流程私下报告',
              '',
              '期待你的 PR 合并 :rocket:',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: targetNumber,
              body: intro,
            });

            // 给新贡献者的 PR 自动添加 first-time-contributor 标签
            if (isPR) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: targetNumber,
                  labels: ['first-time-contributor', 'needs-review'],
                });
              } catch (e) {
                core.warning(`Failed to add labels: ${e.message}`);
              }
            }
