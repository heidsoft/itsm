name: Security Scan

# Purpose:
#   Run security-focused scans that are separate from normal build/test CI.
# Notes:
#   - gosec and Trivy upload SARIF to the GitHub Security tab.
#   - npm audit is limited to production dependencies and critical severity
#     so historical dev/high advisories do not block every routine change.
#   - TruffleHog scans for accidental secret exposure.

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday at 6am
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  gosec:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: itsm-backend/go.sum

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec-results.sarif ./itsm-backend/...'

      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif
          category: gosec

  trivy:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy

  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd itsm-frontend
          npm config set registry https://registry.npmjs.org
          # Patch eslint to ^9 (same reason as frontend-ci / release):
          # eslint v10 from dependabot breaks --legacy-peer-deps install
          # when npm tries to validate eslint-config-next@15.x peer range.
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.devDependencies.eslint='^9.0.0';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          npm install --package-lock-only --legacy-peer-deps --no-audit --ignore-scripts
          npm ci --legacy-peer-deps

      - name: Audit
        run: |
          cd itsm-frontend
          npm config set registry https://registry.npmjs.org
          npm audit --omit=dev --audit-level=critical

  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
