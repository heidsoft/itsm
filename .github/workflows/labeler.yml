name: labeler

# Purpose:
#   Auto-apply area/kind/size labels to PRs based on the paths touched.
#   Rules live in `.github/labeler.yml`.
#
# Why:
#   - First-pass triage for maintainers: PRs land with `area:*` + `kind:*`
#     labels, no manual work required.
#   - Filtering by label becomes possible (e.g., "all PRs touching
#     `itsm-ai-service/` with `kind:bugfix`").
#   - Combined with `stale.yml`, the bot can keep issues/PRs organized
#     without manual upkeep.
#
# Maintenance:
#   - Edit `.github/labeler.yml` to add new area/kind rules.
#   - PR titles should follow Conventional Commits
#     (feat:, fix:, refactor:, docs:, chore:, ci:) — the bot will pick
#     up `kind:*` based on title prefix in a future iteration.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Apply path-based labels
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: false   # do not remove manually-applied labels
          dot: false           # allow glob `**/*.md` etc. without breaking

      - name: Apply title-based labels
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = [];

            if (/^feat(\(|:|\b)/.test(title)) labels.push('kind/feature');
            if (/^fix(\(|:|\b)/.test(title))  labels.push('kind/bugfix');
            if (/^refactor(\(|:|\b)/.test(title)) labels.push('kind/refactor');
            if (/^docs(\(|:|\b)/.test(title)) labels.push('kind/docs');
            if (/^test(\(|:|\b)/.test(title)) labels.push('kind/tests');
            if (/^chore(\(|:|\b)/.test(title)) labels.push('kind/chore');
            if (/^ci(\(|:|\b)/.test(title))    labels.push('kind/ci');
            if (/^build(\(|:|\b)/.test(title)) labels.push('kind/build');

            if (labels.length === 0) return;

            // Fetch existing labels to avoid re-adding.
            const { data: existing } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existingNames = new Set(existing.map(l => l.name));
            const toAdd = labels.filter(l => !existingNames.has(l));
            if (toAdd.length === 0) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: toAdd,
            });

      - name: Apply size labels
        uses: actions/github-script@v7
        with:
          script: |
            // Heuristic size buckets: XS < 10, S < 50, M < 200, L < 1000, XL
            // Source: actions/labeler v5's size-bot logic, ported inline
            // so we don't need a second bot token.
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const changed = additions + deletions;

            let sizeLabel;
            if (changed < 10) sizeLabel = 'size/xs';
            else if (changed < 50) sizeLabel = 'size/s';
            else if (changed < 200) sizeLabel = 'size/m';
            else if (changed < 1000) sizeLabel = 'size/l';
            else sizeLabel = 'size/xl';

            // Skip adding if any size label is already present (manual override).
            const { data: existing } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const hasSize = existing.some(l => l.name.startsWith('size/'));
            if (hasSize) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [sizeLabel],
            });

      - name: Apply breaking-change label
        uses: actions/github-script@v7
        if: contains(github.event.pull_request.body, 'BREAKING CHANGE')
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['breaking-change'],
            });