name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: "1"

jobs:
  # ── Go backend: unit tests ──────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: itsm-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Run tests
        run: go test ./... -count=1

  # ── Next.js frontend: lint + type-check ─────────────────
  frontend-check:
    name: Frontend lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: itsm-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint:check
      - run: npm run type-check

  # ── Build all images (multi-stage) with shared cache ────
  docker-build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    strategy:
      matrix:
        include:
          - service: backend
            context: itsm-backend
            dockerfile: Dockerfile.prod
            target: runtime
            args: |
              GOPROXY=https://goproxy.cn,direct
          - service: frontend
            context: itsm-frontend
            dockerfile: Dockerfile
            target: production
            args: |
              NPM_REGISTRY=https://registry.npmmirror.com
              NEXT_PUBLIC_ENABLE_AI=true
          - service: ai-service
            context: itsm-ai-service
            dockerfile: Dockerfile
            target: runtime
            args: |
              TORCH_INDEX=https://download.pytorch.org/whl/cpu
          - service: guidance_sidecar
            context: itsm-backend/guidance_sidecar
            dockerfile: Dockerfile
            target: runtime
            args: |
              TORCH_INDEX=https://download.pytorch.org/whl/cpu
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          build-args: ${{ matrix.args }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: itsm-${{ matrix.service }}:ci
