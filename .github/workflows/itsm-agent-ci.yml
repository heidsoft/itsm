name: itsm-agent-ci

# Purpose:
#   Validate changes to `itsm-agent/` (AI Developer Agent CLI) before
#   they reach main.
#
# Checks:
#   - gofumpt formatting
#   - go vet
#   - go build
#   - go test ./... (if any _test.go files exist)
#   - go mod verify
#
# Why a dedicated workflow (instead of reusing backend-ci):
#   - itsm-agent has its own go.mod (go 1.21) and its own module path.
#   - Path-scoped to itsm-agent/** so backend changes do not waste CI
#     minutes and agent changes do not get hidden under backend failures.

on:
  push:
    branches: [main, develop]
    paths:
      - 'itsm-agent/**'
      - '.github/workflows/itsm-agent-ci.yml'
  pull_request:
    paths:
      - 'itsm-agent/**'
      - '.github/workflows/itsm-agent-ci.yml'
  workflow_dispatch:

env:
  GOPROXY: "https://proxy.golang.org,direct"
  GOSUMDB: "sum.golang.org"

jobs:
  lint:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: itsm-agent/go.mod
          cache: true
          cache-dependency-path: itsm-agent/go.sum

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Check formatting
        working-directory: ./itsm-agent
        run: |
          if [ -n "$(gofumpt -l .)" ]; then
            echo "::error::Run 'gofumpt -w .' to fix formatting"
            gofumpt -d .
            exit 1
          fi

      - name: go vet
        working-directory: ./itsm-agent
        run: go vet ./...

      - name: go build
        working-directory: ./itsm-agent
        run: |
          go build -o itsm-agent ./main.go
          # Smoke test: --version must succeed and exit 0.
          ./itsm-agent --version

      - name: Verify Go modules
        working-directory: ./itsm-agent
        run: go mod verify

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: itsm-agent-binary
          path: itsm-agent/itsm-agent
          retention-days: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: itsm-agent/go.mod
          cache: true
          cache-dependency-path: itsm-agent/go.sum

      - name: Run tests
        working-directory: ./itsm-agent
        run: |
          # Skip silently when there are no _test.go files yet. Once
          # any test file lands, this step will surface and gate PRs.
          TESTABLE_PKGS=$(go list ./... 2>/dev/null)
          if [ -z "$TESTABLE_PKGS" ]; then
            echo "::notice::No Go packages discovered under itsm-agent/."
            exit 0
          fi
          TEST_FILES=$(find . -name '*_test.go' -type f 2>/dev/null | wc -l | tr -d ' ')
          if [ "$TEST_FILES" = "0" ]; then
            echo "::notice::No _test.go files in itsm-agent/ yet — skipping test step."
            exit 0
          fi
          go test $TESTABLE_PKGS -coverprofile=coverage.out -covermode=set
          if [ -f coverage.out ]; then
            go tool cover -func=coverage.out | tail -5
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: itsm-agent-coverage
          path: itsm-agent/coverage.out
          retention-days: 7