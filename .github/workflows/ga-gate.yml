name: ga-gate

# Integration gate only. Unit, lint and build checks live in backend-ci and
# frontend-ci; this workflow proves the assembled core stack can boot and serve.
on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'itsm-backend/**'
      - 'itsm-frontend/**'
      - 'docker-compose.dev.yml'
      - 'scripts/smoke-test.sh'
      - '.github/workflows/ga-gate.yml'
  push:
    branches: [main]
    paths:
      - 'itsm-backend/**'
      - 'itsm-frontend/**'
      - 'docker-compose.dev.yml'
      - 'scripts/smoke-test.sh'
      - '.github/workflows/ga-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ga-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ga-approved:
    name: GA Gate · Approved
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DEPLOYMENT_MODE: private
      MAX_RETRIES: '120'
      RETRY_INTERVAL: '3'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Compose configuration
        run: docker compose -f docker-compose.dev.yml --profile dev config --quiet

      - name: Start core stack
        run: >-
          docker compose -f docker-compose.dev.yml --profile dev
          up -d --build postgres redis minio itsm-init itsm-backend itsm-frontend

      - name: Wait for backend and frontend
        run: |
          for attempt in $(seq 1 60); do
            backend_status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8090/api/v1/health || true)
            frontend_status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/health || true)
            if [ "$backend_status" = '200' ] && [ "$frontend_status" = '200' ]; then
              echo "Core stack ready after ${attempt} attempts"
              exit 0
            fi
            sleep 5
          done
          echo '::error::Core stack did not become healthy in time'
          exit 1

      - name: Run API smoke tests
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh

      - name: Upload failure logs
        if: failure()
        run: >-
          docker compose -f docker-compose.dev.yml --profile dev logs
          --no-color --tail=200 > ga-gate-compose.log

      - name: Save failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ga-gate-compose-logs
          path: ga-gate-compose.log
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml --profile dev down -v --remove-orphans
