name: frontend-tests

on:
  push:
    paths:
      - 'itsm-frontend/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    paths:
      - 'itsm-frontend/**'
      - '.github/workflows/frontend-tests.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: itsm-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check
        continue-on-error: true

  type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: itsm-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check
        continue-on-error: true

  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: itsm-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: itsm-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run full tests
        run: npm test -- --runInBand --passWithNoTests
        continue-on-error: true

  # E2E tests require a running backend server - skipped in CI
  # To run E2E tests locally: npm run test:e2e (requires backend at localhost:8080)
  # e2e:
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 20
  #   steps:
  #     - Checkout
  #     - Setup Node.js
  #     - Install dependencies
  #     - Install Playwright browsers
  #     - Build app
  #     - Start app (requires backend)
  #     - Run Playwright tests
