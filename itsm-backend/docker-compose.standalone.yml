version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: itsm-postgres
    environment:
      POSTGRES_DB: itsm
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d itsm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: itsm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  itsm-backend:
    image: debian:stable-slim
    container_name: itsm-backend
    user: root
    working_dir: /app
    volumes:
      - ./deploy/itsm:/app/itsm
      - ./deploy/config.yaml:/app/config.yaml
    environment:
      - DATABASE_URL=postgres://dev:${DB_PASSWORD}@postgres:5432/itsm?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    entrypoint: ["/bin/sh", "-c", "chmod +x /app/itsm && cd /app && /app/itsm"]

volumes:
  postgres_data:
  redis_data:
