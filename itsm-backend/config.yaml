database:
  host: localhost
  port: 5432
  user: dev
  password: "${DB_PASSWORD:StrongPassword123!}"  # Use env: DB_PASSWORD, default for dev
  dbname: itsm
  sslmode: disable

# pgvector configuration (optional, for RAG/AI features)
# Install extension: CREATE EXTENSION IF NOT EXISTS vector;
# vectors table is auto-created if not exists
vector:
  enabled: false  # Set to true when pgvector is installed
  dimension: 1536  # OpenAI text-embedding-3-small dimension

server:
  port: 8090
  mode: "${SERVER_MODE:release}"  # Use env: SERVER_MODE, default release

jwt:
  secret: "${JWT_SECRET:ChangeThisToARandomSecretInProduction!}"  # Use env: JWT_SECRET
  expire_time: 900        # 15分钟 (access token)
  refresh_expire_time: 604800  # 7天 (refresh token)

log:
  level: "${LOG_LEVEL:info}"  # debug, info, warn, error
  path: ./logs                # 日志文件目录
  max_size: 100               # 单个日志文件最大大小(MB)
  max_backups: 30            # 保留的旧日志文件数量
  max_age: 90                # 日志文件保留天数
  compress: true              # 是否压缩旧日志文件
  development: false          # 开发模式(输出到console)

llm:
  provider: openai        # openai, azure, local
  model: gpt-4o-mini
  api_key: "${OPENAI_API_KEY:}"             # Use env: OPENAI_API_KEY
  endpoint: ""            # For Azure: https://{resource}.openai.azure.com/
  deployment: ""          # Azure deployment ID
  token_cap: 8000         # Rate limit

# Embedding configuration for RAG
embedding:
  provider: openai        # openai, local
  model: text-embedding-3-small
  api_key: "${OPENAI_API_KEY:}"             # Use env: OPENAI_API_KEY
  endpoint: ""            # Custom embedding endpoint

# SMS Configuration (阿里云/腾讯云)
sms:
  provider: ""  # "aliyun" or "tencent", empty means disabled
  aliyun:
    access_key_id: "${ALIYUN_ACCESS_KEY_ID:}"
    access_key_secret: "${ALIYUN_ACCESS_KEY_SECRET:}"
    sign_name: "${ALIYUN_SMS_SIGN_NAME:ITSM}"
    endpoint: "dysmsapi.aliyuncs.com"
  tencent:
    secret_id: "${TENCENT_SECRET_ID:}"
    secret_key: "${TENCENT_SECRET_KEY:}"
    app_id: "${TENCENT_SMS_APP_ID:}"
    sign_name: "${TENCENT_SMS_SIGN_NAME:ITSM}"
    endpoint: "sms.tencentcloudapi.com"

# Security settings (Legacy, use 'jwt' section above)
security:
  jwt_secret: "${JWT_SECRET}" # Reference to main config or env
  token_expiry: 24h
  refresh_token_expiry: 168h
  bcrypt_cost: 10

# Admin user settings
admin:
  username: "admin"
  password: "${ADMIN_PASSWORD:CHANGE_THIS_PASSWORD_IMMEDIATELY}" # 生产环境请务必修改
  email: "admin@example.com"

# SMTP Email Configuration
# Used for sending notifications, SLA alerts, and system emails
smtp:
  enabled: false  # Set to true to enable email notifications
  host: "${SMTP_HOST:smtp.example.com}"      # SMTP server host
  port: "${SMTP_PORT:587}"                   # SMTP port (587 for TLS, 465 for SSL)
  username: "${SMTP_USERNAME:}"              # SMTP username (email address)
  password: "${SMTP_PASSWORD:}"              # SMTP password or app-specific password
  from_email: "${SMTP_FROM_EMAIL:noreply@example.com}"  # Sender email address
  from_name: "${SMTP_FROM_NAME:ITSM System}" # Sender name
  encryption: "${SMTP_ENCRYPTION:tls}"       # tls, ssl, or none
  skip_verify: "${SMTP_SKIP_VERIFY:false}"   # Skip TLS certificate verification (dev only)
