database:
  host: "${DB_HOST:localhost}"
  port: 5432
  user: "${DB_USER:itsm}"
  password: "${DB_PASSWORD:itsm_password_2026}"
  dbname: "${DB_NAME:itsm}"
  sslmode: "${DB_SSLMODE:disable}"

# pgvector configuration (optional, for RAG/AI features)
# Install extension: CREATE EXTENSION IF NOT EXISTS vector;
# vectors table is auto-created if not exists
vector:
  enabled: true  # Set to true when pgvector is installed
  dimension: 1536  # OpenAI text-embedding-3-small dimension

server:
  port: 8090
  mode: "${SERVER_MODE:release}"  # Use env: SERVER_MODE, default release

jwt:
  secret: "${JWT_SECRET}"
  expire_time: 900        # 15分钟 (access token)
  refresh_expire_time: 604800  # 7天 (refresh token)

log:
  level: "${LOG_LEVEL:error}"  # debug, info, warn, error (production default: error)
  path: ./logs                # 日志文件目录
  max_size: 200               # 单个日志文件最大大小(MB)
  max_backups: 20             # 保留的旧日志文件数量 - 优化存储 (200MB * 20 = 4GB)
  max_age: 90                # 日志文件保留天数
  compress: true              # 是否压缩旧日志文件
  local_time: false           # 日志文件名是否使用本地时间 (默认 UTC)
  development: false          # 开发模式(输出到console)

llm:
  provider: "${LLM_PROVIDER:openai}"        # openai, azure, local, minimax
  model: "${LLM_MODEL:gpt-4o-mini}"
  api_key: "${LLM_API_KEY:}"                # Recommended: set LLM_API_KEY; provider-specific envs also supported in code
  endpoint: "${LLM_ENDPOINT:}"              # For Azure/Custom endpoints
  deployment: "${LLM_DEPLOYMENT:}"          # Azure deployment ID
  token_cap: 8000         # Rate limit

# Embedding configuration for RAG
embedding:
  provider: openai        # openai, local
  model: text-embedding-3-small
  api_key: "${OPENAI_API_KEY:}"             # Use env: OPENAI_API_KEY
  endpoint: ""            # Custom embedding endpoint

# SMS Configuration (阿里云/腾讯云)
sms:
  provider: ""  # "aliyun" or "tencent", empty means disabled
  aliyun:
    access_key_id: "${ALIYUN_ACCESS_KEY_ID:}"
    access_key_secret: "${ALIYUN_ACCESS_KEY_SECRET:}"
    sign_name: "${ALIYUN_SMS_SIGN_NAME:ITSM}"
    endpoint: "dysmsapi.aliyuncs.com"
  tencent:
    secret_id: "${TENCENT_SECRET_ID:}"
    secret_key: "${TENCENT_SECRET_KEY:}"
    app_id: "${TENCENT_SMS_APP_ID:}"
    sign_name: "${TENCENT_SMS_SIGN_NAME:ITSM}"
    endpoint: "sms.tencentcloudapi.com"

# Security settings (Legacy, use 'jwt' section above)
security:
  jwt_secret: "${JWT_SECRET}" # Reference to main config or env
  token_expiry: 24h
  refresh_token_expiry: 168h
  bcrypt_cost: 10
  csrf_enabled: true  # Enable CSRF protection (required for production)

# Admin user settings
admin:
  username: "admin"
  password: "${ADMIN_PASSWORD}"  # Required: set ADMIN_PASSWORD env var
  email: "admin@example.com"

# SMTP Email Configuration
# Used for sending notifications, SLA alerts, and system emails
smtp:
  enabled: false  # Set to true to enable email notifications
  host: "smtp.example.com"      # SMTP server host
  port: 587                   # SMTP port (587 for TLS, 465 for SSL)
  username: ""              # SMTP username (email address)
  password: ""              # SMTP password or app-specific password
  from_email: "noreply@example.com"  # Sender email address
  from_name: "ITSM System" # Sender name
  encryption: "tls"       # tls, ssl, or none
  skip_verify: false   # Skip TLS certificate verification (dev only)

# Redis configuration (for sequence service, cache, etc.)
redis:
  host: "localhost"
  port: 6379
  password: "${REDIS_PASSWORD:}"
  db: 0
