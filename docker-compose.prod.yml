version: "3.8"

services:
  # PostgreSQL 数据库（生产环境）
  postgres:
    image: pgvector/pgvector:pg17
    container_name: itsm-postgres-prod
    hostname: postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-itsm_prod}
      POSTGRES_USER: ${DB_USER:-itsm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups:/backups:ro
    networks:
      - itsm-prod-network
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-itsm} -d ${DB_NAME:-itsm_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # Redis 缓存（生产环境）
  redis:
    image: redis:7-alpine
    container_name: itsm-redis-prod
    hostname: redis
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --maxmemory 2gb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10
      --save 60 10000 --appendonly yes --appendfsync everysec
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - itsm-prod-network
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}",
          "ping",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always

  # MinIO 对象存储（生产环境，可替换为 S3）
  minio:
    image: minio/minio:latest
    container_name: itsm-minio-prod
    hostname: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
    volumes:
      - minio_prod_data:/data
    networks:
      - itsm-prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # ITSM 后端服务（生产环境）
  itsm-init:
    build:
      context: ./itsm-backend
      dockerfile: Dockerfile.prod
    container_name: itsm-init-prod
    hostname: init
    command: ["./main"]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-itsm}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - DB_NAME=${DB_NAME:-itsm_prod}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - REDIS_DB=0
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - LOG_LEVEL=error
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-private}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - ITSM_BOOTSTRAP_ONLY=true
      - ITSM_AUTO_MIGRATE=true
      - ITSM_AUTO_SEED=true
      - no_proxy=localhost,127.0.0.1
      - NO_PROXY=localhost,127.0.0.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads:rw
      - ./config:/app/config:ro
    networks:
      - itsm-prod-network
    restart: "no"

  # ITSM 后端服务（生产环境）
  itsm-backend:
    build:
      context: ./itsm-backend
      dockerfile: Dockerfile.prod
    container_name: itsm-backend-prod
    hostname: backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-itsm}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - DB_NAME=${DB_NAME:-itsm_prod}
      - DB_SSLMODE=${DB_SSLMODE:-disable}

      # Redis 配置
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - REDIS_DB=0

      # 服务配置
      - SERVER_ENV=production
      - SERVER_HOST=0.0.0.0
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}

      # JWT 配置（生产环境必须更改！）
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JWT_EXPIRE_TIME=86400
      - JWT_REFRESH_EXPIRE_TIME=604800

      # 日志配置
      - LOG_LEVEL=error
      - LOG_PATH=/app/logs
      - LOG_FORMAT=json
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-private}
      - ITSM_AUTO_MIGRATE=false
      - ITSM_AUTO_SEED=false

      # 监控
      - ENABLE_METRICS=true

      # 对象存储（生产用 S3 或 MinIO）
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
      - MINIO_BUCKET=${MINIO_BUCKET:-itsm-uploads}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}

      # Proxy bypass for health checks
      - no_proxy=localhost,127.0.0.1
      - NO_PROXY=localhost,127.0.0.1

      # LLM 配置（生产环境）
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}

      # 告警通知
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@yourdomain.com}

      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK:-}
      - WECOM_WEBHOOK=${WECOM_WEBHOOK:-}

      # 其他配置
      - ENABLE_CORS=true
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://yourdomain.com}
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      itsm-init:
        condition: service_completed_successfully
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads:rw
      - ./config:/app/config:ro
    networks:
      - itsm-prod-network
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "http_proxy= https_proxy= HTTP_PROXY= HTTPS_PROXY= wget --no-verbose --tries=1 --spider http://localhost:8090/api/v1/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always

  # ITSM 前端服务（生产环境）
  itsm-frontend:
    build:
      context: ./itsm-frontend
      dockerfile: Dockerfile
      target: production
      args:
        - NODE_ENV=production
        - ITSM_BACKEND_URL=http://itsm-backend:8090
        - NEXT_PUBLIC_ENABLE_AI=${NEXT_PUBLIC_ENABLE_AI:-true}
    container_name: itsm-frontend-prod
    hostname: frontend
    environment:
      - NODE_ENV=production
      - ITSM_BACKEND_URL=http://itsm-backend:8090
      - no_proxy=localhost,127.0.0.1
      - NO_PROXY=localhost,127.0.0.1
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/public/uploads:ro
    networks:
      - itsm-prod-network
    depends_on:
      itsm-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "http_proxy= https_proxy= HTTP_PROXY= HTTPS_PROXY= wget --no-verbose --tries=1 --spider http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: always

  # Nginx 反向代理（生产环境）
  nginx:
    image: nginx:alpine
    container_name: itsm-nginx-prod
    hostname: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      itsm-frontend:
        condition: service_healthy
      itsm-backend:
        condition: service_healthy
    networks:
      - itsm-prod-network
    healthcheck:
      test: ["CMD", "sh", "-c", "http_proxy= https_proxy= HTTP_PROXY= HTTPS_PROXY= wget --no-verbose --tries=1 --spider http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: always

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  minio_prod_data:
    driver: local

networks:
  itsm-prod-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
