version: "3.8"

services:
  # PostgreSQL 数据库（生产环境）
  postgres:
    image: postgres:17-alpine
    container_name: itsm-postgres-prod
    hostname: postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-itsm_prod}
      POSTGRES_USER: ${DB_USER:-itsm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-itsm_password_change_me}
    ports:
      - "5432:5432" # 生产环境建议只暴露给内网，或使用 SSL
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups:/backups:ro
    networks:
      - itsm-prod-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-itsm} -d ${DB_NAME:-itsm_prod}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "1.0"

  # Redis 缓存（生产环境）
  redis:
    image: redis:7-alpine
    container_name: itsm-redis-prod
    hostname: redis
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
      --maxmemory 2gb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10
      --save 60 10000 --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - itsm-prod-network
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-redis_password_change_me}",
          "ping",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 1G
          cpus: "0.5"

  # ITSM 后端服务（生产环境）
  itsm-backend:
    build:
      context: ./itsm-backend
      dockerfile: Dockerfile.backend
      args:
        - BUILDKIT_INLINE_CACHE=1
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
        - BUILD_DATE=${BUILD_DATE:-unknown}
    container_name: itsm-backend-prod
    hostname: backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-itsm}
      - DB_PASSWORD=${DB_PASSWORD:-itsm_password_change_me}
      - DB_NAME=${DB_NAME:-itsm_prod}
      - DB_SSLMODE=${DB_SSLMODE:-disable}

      # Redis 配置
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password_change_me}
      - REDIS_DB=0

      # 服务配置
      - PORT=8090
      - GIN_MODE=release
      - SERVER_ENV=production
      - SERVER_HOST=0.0.0.0

      # JWT 配置（生产环境必须更改！）
      - JWT_SECRET=${JWT_SECRET:-jwt_secret_change_me_minimum_32_chars_long}
      - JWT_EXPIRE_TIME=86400
      - JWT_REFRESH_EXPIRE_TIME=604800

      # 日志配置
      - LOG_LEVEL=error
      - LOG_PATH=/app/logs
      - LOG_FORMAT=json

      # 监控
      - ENABLE_METRICS=true
      - METRICS_PORT=9090

      # 对象存储（生产用 S3 或 MinIO）
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minio_secret_change_me}
      - MINIO_BUCKET=${MINIO_BUCKET:-itsm-uploads}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}

      # LLM 配置（生产环境）
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}

      # 告警通知
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM:-noreply@yourdomain.com}

      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK}
      - WECOM_WEBHOOK=${WECOM_WEBHOOK}

      # 其他配置
      - ENABLE_CORS=true
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://yourdomain.com}
    ports:
      - "8090:8090"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads:rw
      - ./config:/app/config:ro
    networks:
      - itsm-prod-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "1.0"
      replicas: 2 # 生产建议至少 2 副本

  # ITSM 前端服务（生产环境）
  itsm-frontend:
    build:
      context: ./itsm-frontend
      dockerfile: Dockerfile.frontend
      target: production
      args:
        - NODE_ENV=production
        - NEXT_PUBLIC_ENABLE_AI=${NEXT_PUBLIC_ENABLE_AI:-true}
    container_name: itsm-frontend-prod
    hostname: frontend
    environment:
      - NODE_ENV=production
      - ITSM_BACKEND_URL=http://itsm-backend:8090
      - NEXT_PUBLIC_API_URL=http://itsm-backend:8090
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/public/uploads:ro
    networks:
      - itsm-prod-network
    depends_on:
      - itsm-backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 1G
          cpus: "0.5"
      replicas: 2

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  minio_prod_data:
    driver: local
  prometheus_prod_data:
    driver: local
  grafana_prod_data:
    driver: local

networks:
  itsm-prod-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
