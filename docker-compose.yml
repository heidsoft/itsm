version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:17-alpine
    container_name: itsm-postgres
    environment:
      POSTGRES_DB: itsm
      POSTGRES_USER: itsm
      POSTGRES_PASSWORD: itsm_password_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - itsm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itsm -d itsm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: itsm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - itsm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ITSM 后端服务
  itsm-backend:
    build:
      context: ./itsm-backend
      dockerfile: Dockerfile
    container_name: itsm-backend
    environment:
      - DATABASE_URL=postgres://itsm:itsm_password_2026@postgres:5432/itsm?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - PORT=8080
      - GIN_MODE=release
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - itsm-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ITSM 前端服务
  itsm-frontend:
    build:
      context: ./itsm-frontend
      dockerfile: Dockerfile
    container_name: itsm-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api/v1
    ports:
      - "3000:80"
    depends_on:
      - itsm-backend
    networks:
      - itsm-network
    restart: unless-stopped

networks:
  itsm-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
