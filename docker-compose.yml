version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: itsm
      POSTGRES_USER: itsm
      POSTGRES_PASSWORD: itsm_password_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - itsm-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U itsm -d itsm" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - itsm-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ITSM 后端服务
  itsm-backend:
    build:
      context: ./itsm-backend
      dockerfile: Dockerfile.backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=itsm
      - DB_PASSWORD=itsm_password_2026
      - DB_NAME=itsm
      - DB_SSLMODE=disable

      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0

      - JWT_SECRET=dev-secret-key-change-in-production-minimum-32-characters-long
      - SERVER_MODE=release
      - LOG_LEVEL=info
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - itsm-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ITSM 前端服务
  itsm-frontend:
    build:
      context: ./itsm-frontend
      dockerfile: Dockerfile.frontend
      target: production
    environment:
      - NODE_ENV=production
      - ITSM_BACKEND_URL=http://itsm-backend:8090
      - NEXT_PUBLIC_API_URL=http://itsm-backend:8090
    ports:
      - "3000:3000"
    depends_on:
      - itsm-backend
    networks:
      - itsm-network
    restart: unless-stopped

networks:
  itsm-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
