<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - ITSM</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo"><h1>ITSM</h1></div>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/#resources">资源</a></li>
            </ul>
        </div>
    </nav>

    <section class="analytics-section">
        <div class="container">
            <h1>📊 官网统计分析</h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>页面访问量</h3>
                    <div class="stat-value">0</div>
                    <p>总访问次数</p>
                </div>
                <div class="stat-card">
                    <h3>独立访客</h3>
                    <div class="stat-value">0</div>
                    <p>独立用户数</p>
                </div>
                <div class="stat-card">
                    <h3>试用申请</h3>
                    <div class="stat-value">0</div>
                    <p>试用申请表单</p>
                </div>
                <div class="stat-card">
                    <h3>联系咨询</h3>
                    <div class="stat-value">0</div>
                    <p>联系表单提交</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
