<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OpenClaw 部署管理系统</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            padding: 3rem;
            max-width: 400px;
            width: 100%;
        }
        .login-title {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-title i {
            color: #667eea;
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">
            <i class="fas fa-rocket"></i>
            <h2 class="mt-3">OpenClaw 部署管理系统</h2>
            <p class="text-muted">请登录</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-user"></i> 用户名</label>
                <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-lock"></i> 密码</label>
                <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">记住我</label>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt"></i> 登录
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <small class="text-muted">默认账号：admin / admin</small>
        </div>
        
        <div id="alertPlaceholder"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                // 简单验证（实际应该调用后端 API）
                if (username === 'admin' && password === 'admin') {
                    localStorage.setItem('token', 'admin-token-' + Date.now());
                    localStorage.setItem('username', username);
                    showAlert('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showAlert('用户名或密码错误', 'danger');
                }
            } catch (error) {
                showAlert('登录失败：' + error.message, 'danger');
            }
        });

        function showAlert(message, type) {
            const placeholder = document.getElementById('alertPlaceholder');
            placeholder.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // 检查是否已登录
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }
    </script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
