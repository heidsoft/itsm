# AI Developer Agent Configuration

agent:
  # Poll interval for checking GitHub issues
  poll_interval: "5m"
  # Maximum retries for code generation
  max_retries: 3
  # Timeout for single task execution
  timeout: "30m"
  # Base directory for git worktrees
  worktree_base: "/tmp/ai-worktrees"
  # Log level: debug, info, warn, error
  log_level: "info"

github:
  # GitHub owner (user or organization)
  owner: "heidsoft"
  # Repository name
  repo: "itsm"
  # Labels to filter issues
  labels:
    - "autonomous"
  # Issue states to watch: open, all
  issue_state: "open"
  # GitHub CLI path or full path
  gh_cli: "gh"

claude:
  # Claude CLI path
  cli_path: "claude"
  # Model to use: sonnet, opus, haiku
  model: "sonnet"
  # Additional CLI flags
  extra_args: []

validation:
  enabled: true
  backend:
    enabled: true
    # Build timeout in minutes
    build_timeout: 10
    # Test timeout in minutes
    test_timeout: 15
  frontend:
    enabled: true
    # Type check timeout in minutes
    type_check_timeout: 10
    # Lint timeout in minutes
    lint_timeout: 10

pr:
  # Auto-add reviewers
  reviewers: []
  # PR title prefix
  title_prefix: "[AI] "
  # Base branch for PR
  base_branch: "main"
  # Allow edits from maintainers
  allow_edits: true

human:
  # Enable human review gate
  enabled: true
  # Review timeout in hours
  review_timeout: 24
  # Slack webhook URL (optional)
  slack_webhook: ""
  # Discord webhook URL (optional)
  discord_webhook: ""

redis:
  # Redis address
  address: "localhost:6379"
  # Redis password (empty for no auth)
  password: ""
  # Redis db number
  db: 0
  # Key prefix for deduplication
  key_prefix: "ai-agent:"
