name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NEXT_TELEMETRY_DISABLED: 1
  CI: true
  NODE_ENV: test

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Clear npm cache
      run: npm cache clean --force
      continue-on-error: true

    - name: Install dependencies
      run: npm ci

    - name: Run lint
      run: npm run lint:check
      continue-on-error: true

    - name: Upload lint results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: '*.log'
        retention-days: 3

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Clear npm cache
      run: npm cache clean --force
      continue-on-error: true

    - name: Install dependencies
      run: npm ci

    - name: Run type check
      run: npm run type-check

    - name: Upload type check results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: type-check-results
        path: '*.log'
        retention-days: 3

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Clear npm cache
      run: npm cache clean --force
      continue-on-error: true

    - name: Install dependencies
      run: npm ci

    - name: Run unit tests
      run: npm run test:unit -- --passWithNoTests --coverage=false
      continue-on-error: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: junit.xml
        retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Clear npm cache
      run: npm cache clean --force
      continue-on-error: true

    - name: Install dependencies
      run: npm ci

    - name: Run integration tests
      run: npm run test:integration -- --passWithNoTests --coverage=false
      continue-on-error: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: junit.xml
        retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, type-check]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Clear npm cache
      run: npm cache clean --force
      continue-on-error: true

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NODE_OPTIONS: --max-old-space-size=4096

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: frontend-build
        path: |
          .next/
          public/
        retention-days: 7

    - name: Upload build stats
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-stats
        path: .next/stats.json
        retention-days: 7

